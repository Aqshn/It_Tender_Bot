name: eTender IT Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-monitor.txt

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python parcer/etender_it_telegram_monitor.py --once --pages 3 --state-file parcer/.etender_it_state.json

      - name: Commit updated state
        if: success()
        run: |
          if [ -z "$(git status --porcelain -- parcer/.etender_it_state.json)" ]; then
            echo "No state changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add parcer/.etender_it_state.json
          git commit -m "Update eTender monitor state [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
